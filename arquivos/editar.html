<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Página de Edição de Clientes</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="fundo-diagonal">
        <div class="navegacao">
            <a href="index.html" class="botao2">PÁGINA INICIAL</a>
            <a href="cadastrar.html" class="botao2">CADASTRAR</a>
            <a href="clientes.html" class="botao2">CLIENTES</a>
        </div>
        <div class="formulario">
            <input type="hidden" id="cpfCliente" value="" />
            <select id="campo" required>
                <option value="nome">Nome</option>
                <option value="endereco">Endereço</option>
                <option value="anotacoes">Anotações</option>
            </select>
            <input type="text" id="novoValor" placeholder="Novo valor" required />
            <button id="editar" onclick="enviarDadosEdicao()">EDITAR</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
